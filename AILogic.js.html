<script>
// --- AI MODAL LOGIC ---
    function openUploadModal() {
      document.getElementById('aiFile').value = '';
      document.getElementById('fileName').innerText = 'Seleccionar Documento';
      const m = document.getElementById('uploadModal');
      m.classList.remove('hidden'); m.classList.add('flex');
      document.getElementById('uploadModalPanel').classList.add('modal-enter-active');
    }

    function closeUploadModal() {
      const p = document.getElementById('uploadModalPanel');
      p.classList.remove('modal-enter-active'); p.classList.add('modal-exit');
      setTimeout(function () {
        document.getElementById('uploadModal').classList.add('hidden');
        document.getElementById('uploadModal').classList.remove('flex');
        p.classList.remove('modal-exit');
      }, 200);
    }

    function openContextualAi() {
      closeFormModal();
      setTimeout(function () {
        if (document.getElementById('uploadModalTitle')) {
          document.getElementById('uploadModalTitle').innerText = 'Procesamiento para: ' + currentContextualTable;
        }
        document.getElementById('uploadModal').classList.remove('hidden');
        document.getElementById('uploadModal').classList.add('flex');
        setTimeout(function () {
          document.getElementById('uploadModalPanel').classList.add('modal-enter-active');
        }, 10);
      }, 250);
    }

    function runAI() {
      const file = document.getElementById('aiFile').files[0];
      if (!file) return toast("Por favor selecciona un archivo (PDF, DOCX o Excel)", "error");

      const nameMap = {
        'Contratos': 'Contrato',
        'Facturas': 'Factura',
        'Estimaciones': 'Estimación',
        'Contratistas': 'Contratista',
        'Convenios_Recurso': 'Convenio',
        'Convenios_Modificatorios': 'Convenio Modificatorio'
      };

      const docName = currentContextualTable ? (nameMap[currentContextualTable] || 'Documento') : 'Documento';

      showLoader('Procesando ' + docName + ' con IA...');
      closeUploadModal();

      let ctx = null;
      if (window.currentExpedienteId) ctx = { 'ID_Contrato': window.currentExpedienteId };

      const reader = new FileReader();
      reader.onload = function (e) {
        let dataToSend = e.target.result;
        let mimeToSend = file.type;

        if (file.name.toLowerCase().endsWith('.xlsx') || file.name.toLowerCase().endsWith('.xls')) {
          try {
            const workbook = XLSX.read(e.target.result, { type: 'array' });
            const csv = XLSX.utils.sheet_to_csv(workbook.Sheets[workbook.SheetNames[0]]);
            dataToSend = "data:text/csv;base64," + btoa(unescape(encodeURIComponent(csv)));
            mimeToSend = "text/csv";
          } catch (err) {
            hideLoader();
            return toast("Error en conversión Excel: " + err.message, "error");
          }
        }

        google.script.run
          .withSuccessHandler(function (res) {
            hideLoader();
            if (res.success) {
              toast("Base de conocimiento relacional actualizada con IA.");
              preloadData();
            } else {
              toast("Atención AI: " + res.message, "error");
            }
          })
          .withFailureHandler(function (err) { hideLoader(); toast(err.message, "error"); })
          .processDocumentWithAI(dataToSend, mimeToSend, currentContextualTable, ctx);
      };

      if (file.name.toLowerCase().endsWith('.xlsx') || file.name.toLowerCase().endsWith('.xls')) {
        reader.readAsArrayBuffer(file);
      } else {
        reader.readAsDataURL(file);
      }
    }

    // --- DRAG AND DROP LOGIC ---
    function handleAiFileSelect(files) {
      if (files && files.length > 0) {
        document.getElementById('fileName').innerText = files[0].name;
        document.getElementById('aiFile').files = files;
      } else {
        document.getElementById('fileName').innerText = 'Arrastra aquí tu Documento o Haz Clic';
      }
    }

    const dropzone = document.getElementById('dropzone');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function (eventName) {
      dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(function (eventName) {
      dropzone.addEventListener(eventName, function () { dropzone.classList.add('border-inst-gold', 'bg-inst-gold/10'); }, false);
    });

    ['dragleave', 'drop'].forEach(function (eventName) {
      dropzone.addEventListener(eventName, function () { dropzone.classList.remove('border-inst-gold', 'bg-inst-gold/10'); }, false);
    });

    dropzone.addEventListener('drop', handleDrop, false);
    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      handleAiFileSelect(files);
    }
</script>
