  <script>
    // Global Error Handler to catch unexpected tokens and load failures
    window.onerror = function (message, source, lineno, colno, error) {
      console.error("GLOBAL ERROR CAPTURED: ", message, " at ", source, ":", lineno, ":", colno);
      if (error) {
        console.error("ERROR OBJECT: ", error);
        console.error("STACK TRACE: ", error.stack);
      }
      alert("Error en la aplicación:\n" + message + "\nLínea: " + lineno + "\nRevisa la consola (F12) para más detalles.");
      return false; // let default handler run too
    };

    // Also catch unhandled promise rejections
    window.addEventListener('unhandledrejection', function (event) {
      console.error("UNHANDLED PROMISE REJECTION: ", event.reason);
      alert("Error de Promesa no manejada:\n" + event.reason + "\nRevisa la consola (F12).");
    });
  </script>
